<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" href="/static/logo.svg">
	<title>{% block title %}Tecnoline{% endblock %}</title>
	<!-- Load static - MDB-free-6.1.0 -->
	{% load static %}
	<link href="{% static 'mdb-standart-ui-kit-free-6.1.0/css/mdb.min.css' %}" rel="stylesheet">

	<!-- Font Awesome -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
	<!-- Google Fonts -->
	<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet"/>
</head>

<body style="padding-top:56px;">
	<section class="pt-4">
		<header class="section-header fixed-top py-1 bg-light border-bottom">
			<div class="container">
				{% include "nav.html" %}
			</div>
		</header>
		<div class="container">
			{% block content %}
			<!-- page content -->
			{% endblock %}
		</div>
		{% include "footer.html" %}
	</section>
	<!-- MDB JS -->
	<script src="{% static 'mdb-standart-ui-kit-free-6.1.0/js/mdb.min.js' %}"></script>
</body>
</html>
