<div class="card p-3 mb-3 shadow-sm" style="max-width: 810px;">
  <div class="row g-0">
    <div class="col-md-4">
      <img src="{{ product.preview_image.url }}" class="img-fluid rounded-start" alt="...">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h5 class="card-title">
          <a href="/product/{{ product.id }}">{{ product.product_name }}</a>
        </h5>
        <p class="card-text">{{ product.description }}</p>
        <p class="card-text"><small class="text-muted">Last updated 3 mins ago</small></p>
        <a href="#" class="btn btn-primary">Go somewhere</a>
      </div>
    </div> <!--col-->
  </div> <!--row-->
</div> <!--card-->
